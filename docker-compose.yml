# =============================================================================
# docker-compose.yml - Variedades Danni (Full Stack)
# =============================================================================
# Orquesta cuatro servicios:
# 1. db:       PostgreSQL 16 Alpine como base de datos.
# 2. api:      Backend Node.js/Express (desde backendVD/).
# 3. frontend: Frontend React + TypeScript con Vite (desde frontendVD/).
# 4. pgadmin:  pgAdmin 4 para gestionar la base de datos. (http://localhost:5050)
#
# Uso:
#   docker compose up -d              -> Levantar todo en background
#   docker compose up --build          -> Rebuildar imagenes y levantar
#   docker compose down                -> Detener y eliminar contenedores
#   docker compose logs -f api         -> Ver logs del backend en tiempo real
#   docker compose logs -f frontend    -> Ver logs del frontend en tiempo real
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Servicio: Base de datos PostgreSQL
  # Usa la imagen oficial de PostgreSQL 16 Alpine (ligera).
  # Los datos se persisten en un volumen Docker llamado "pg_data".
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: variedades_danni_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Servicio: API Backend (Node.js / Express / Prisma)
  # Se construye desde backendVD/Dockerfile.
  # Espera a que PostgreSQL este healthy antes de arrancar.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backendVD
      dockerfile: Dockerfile
    container_name: variedades_danni_api
    # Override: usar db push con --url ya que prisma.config.ts solo define migrate.url
    command: ["sh", "-c", "npx prisma db push --accept-data-loss --url \"$$DATABASE_URL\" && node dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_PHONE: ${ADMIN_PHONE}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Servicio: Frontend React + TypeScript (Vite dev server)
  # Se construye desde frontendVD/Dockerfile.
  # El volumen monta el codigo local para hot-reload en desarrollo.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontendVD
      dockerfile: Dockerfile
    container_name: variedades_danni_frontend
    ports:
      - "5173:5173"
    volumes:
      # Montar codigo fuente para hot-reload en desarrollo
      - ./frontendVD:/app
      # Volumen anonimo para no sobreescribir node_modules del contenedor
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Servicio: pgAdmin 4 — Administracion visual de PostgreSQL
  # Accesible en http://localhost:5050
  # Login por defecto: admin@variedadesdanii.com / admin
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: variedades_danni_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@variedadesdanii.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

# ---------------------------------------------------------------------------
# Volumenes persistentes
# ---------------------------------------------------------------------------
volumes:
  pg_data:
  pgadmin_data:
